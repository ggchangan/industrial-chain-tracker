<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350" role="img" aria-labelledby="title desc">
  <title id="title">光刻胶产业链深度解析</title>
  <desc id="desc">AI芯片扩产与国产替代驱动下，从树脂、光引发剂、特种气体到ArF/KrF光刻胶制造的产业链封面图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d121c"/>
      <stop offset="0.5" stop-color="#172334"/>
      <stop offset="1" stop-color="#241713"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7df9ff" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#7df9ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#f9d06a" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="resist" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff89c8"/>
      <stop offset="0.42" stop-color="#d558a8"/>
      <stop offset="1" stop-color="#5b2b6c"/>
    </linearGradient>
    <linearGradient id="wafer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bff8ff"/>
      <stop offset="0.5" stop-color="#168da0"/>
      <stop offset="1" stop-color="#0c4757"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd978"/>
      <stop offset="0.55" stop-color="#d8922d"/>
      <stop offset="1" stop-color="#8b4e1d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#57f2ff" stop-opacity="0.3"/>
      <stop offset="0.6" stop-color="#57f2ff" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#57f2ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#dffcff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-25%" y="-30%" width="150%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity="0.36"/>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; letter-spacing: 0; }
      .title { fill: #f7fbff; font-weight: 850; }
      .subtitle { fill: #c4ecef; font-weight: 520; }
      .label { fill: #edf8fb; font-size: 34px; font-weight: 750; }
      .small { fill: #a8c8d0; font-size: 27px; font-weight: 520; }
    </style>
  </defs>
  <rect width="2400" height="1350" fill="url(#bg)"/>
  <rect width="2400" height="1350" fill="url(#grid)"/>
  <ellipse cx="1210" cy="690" rx="820" ry="520" fill="url(#glow)"/>
  <path d="M0 1148 C380 1020 560 1230 930 1088 C1308 942 1540 1075 1840 960 C2098 860 2255 930 2400 820 V1350 H0Z" fill="#060d10" opacity="0.58"/>

  <g transform="translate(126,132)">
    <text class="title" x="0" y="0" font-size="88">光刻胶产业链深度解析</text>
    <text class="subtitle" x="2" y="74" font-size="38">ArF/KrF量价齐升与国产替代验证窗口</text>
    <rect x="0" y="116" width="660" height="6" rx="3" fill="url(#gold)"/>
  </g>

  <g filter="url(#softGlow)">
    <path d="M390 520 C720 450 950 530 1195 660 S1580 812 2045 705" fill="none" stroke="url(#beam)" stroke-width="18" stroke-linecap="round"/>
    <path d="M450 790 C770 690 920 715 1198 710 S1600 700 2040 455" fill="none" stroke="url(#beam)" stroke-width="10" stroke-linecap="round" opacity="0.64"/>
  </g>

  <g transform="translate(126,365)">
    <text class="label" x="0" y="-42">上游核心原材料</text>
    <text class="small" x="0" y="-4">树脂 · 光引发剂 · 溶剂 · 特种气体</text>
    <g filter="url(#shadow)">
      <circle cx="126" cy="150" r="76" fill="#142331" stroke="#65f0f2" stroke-width="4"/>
      <circle cx="88" cy="126" r="18" fill="#ff89c8"/>
      <circle cx="148" cy="102" r="14" fill="#ffd978"/>
      <circle cx="166" cy="172" r="20" fill="#7df9ff"/>
      <path d="M88 126 L148 102 L166 172 L88 126" fill="none" stroke="#dffcff" stroke-width="4" opacity="0.7"/>
      <path d="M265 88 C360 34 468 64 520 146 C585 250 450 334 308 282 C218 248 198 132 265 88Z" fill="url(#resist)"/>
      <path d="M310 112 C378 78 438 86 480 132" fill="none" stroke="#ffd5ef" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
      <rect x="80" y="345" width="500" height="122" rx="18" fill="#101922" stroke="#65f0f2" stroke-width="4"/>
      <path d="M120 406 H540" stroke="#ff89c8" stroke-width="12" stroke-linecap="round"/>
      <path d="M160 376 V436M260 376 V436M360 376 V436M460 376 V436" stroke="#ffd978" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(770,335)" filter="url(#shadow)">
    <text class="label" x="115" y="-42">中游光刻胶制造</text>
    <text class="small" x="118" y="-4">g/i线 → KrF → ArF → EUV</text>
    <g transform="translate(0,92)">
      <path d="M80 430 C220 305 645 300 865 430 L955 508 H0 Z" fill="url(#wafer)" stroke="#9ef5ff" stroke-width="5"/>
      <path d="M166 430 C340 350 575 350 780 430" fill="none" stroke="#dffcff" stroke-width="4" opacity="0.55"/>
      <path d="M230 392 H720" stroke="url(#resist)" stroke-width="30" stroke-linecap="round" opacity="0.92"/>
      <path d="M292 360 C405 318 585 318 710 354" fill="none" stroke="#ffd978" stroke-width="9" stroke-linecap="round"/>
      <circle cx="285" cy="450" r="28" fill="#0a1116" stroke="#dffcff" stroke-width="4"/>
      <circle cx="760" cy="450" r="28" fill="#0a1116" stroke="#dffcff" stroke-width="4"/>
      <rect x="246" y="0" width="520" height="116" rx="20" fill="#101a24" stroke="#65f0f2" stroke-width="4"/>
      <text class="small" x="506" y="50" font-size="28" text-anchor="middle">半导体光刻胶配方平台</text>
      <text class="small" x="506" y="88" font-size="22" text-anchor="middle">彤程 · 南大 · 上海新阳 · 晶瑞</text>
      <path d="M505 116 L505 312" stroke="#7df9ff" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    </g>
  </g>

  <g transform="translate(1810,342)">
    <text class="label" x="0" y="-34">下游应用</text>
    <text class="small" x="0" y="4">晶圆制造 · IDM · 先进封装</text>
    <g filter="url(#shadow)">
      <rect x="20" y="150" width="140" height="450" rx="14" fill="#101922" stroke="#62e6ef" stroke-width="3"/>
      <rect x="184" y="105" width="140" height="495" rx="14" fill="#142331" stroke="#62e6ef" stroke-width="3"/>
      <rect x="348" y="205" width="140" height="395" rx="14" fill="#101922" stroke="#62e6ef" stroke-width="3"/>
      <g fill="#21c5b7">
        <rect x="52" y="215" width="86" height="15" rx="7"/>
        <rect x="52" y="273" width="86" height="15" rx="7"/>
        <rect x="216" y="170" width="86" height="15" rx="7"/>
        <rect x="216" y="228" width="86" height="15" rx="7"/>
        <rect x="380" y="264" width="86" height="15" rx="7"/>
        <rect x="380" y="322" width="86" height="15" rx="7"/>
      </g>
    </g>
  </g>

  <g transform="translate(126,1190)">
    <rect x="0" y="0" width="150" height="58" rx="29" fill="#17313c" stroke="#57f2ff" stroke-opacity="0.48"/>
    <rect x="186" y="0" width="196" height="58" rx="29" fill="#3b2b18" stroke="#ffd978" stroke-opacity="0.5"/>
    <rect x="418" y="0" width="160" height="58" rx="29" fill="#3b1633" stroke="#ff89c8" stroke-opacity="0.55"/>
    <rect x="614" y="0" width="190" height="58" rx="29" fill="#132d2b" stroke="#35d39a" stroke-opacity="0.5"/>
    <rect x="840" y="0" width="250" height="58" rx="29" fill="#172538" stroke="#6aa5ff" stroke-opacity="0.48"/>
    <text class="small" x="50" y="38">树脂</text>
    <text class="small" x="228" y="38">光引发剂</text>
    <text class="small" x="458" y="38">光刻气</text>
    <text class="small" x="652" y="38">光刻胶制造</text>
    <text class="small" x="884" y="38">晶圆厂/先进封装</text>
  </g>
</svg>
