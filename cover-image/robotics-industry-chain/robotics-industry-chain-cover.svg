<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350" role="img" aria-labelledby="title desc">
  <title id="title">机器人产业链深度解析</title>
  <desc id="desc">特斯拉链、英伟达链、华为链并行加速下，人形机器人核心零部件与整机生态的微信公众号封面图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d121c"/>
      <stop offset="0.48" stop-color="#142635"/>
      <stop offset="1" stop-color="#201914"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dffcff"/>
      <stop offset="0.45" stop-color="#5fd9e6"/>
      <stop offset="1" stop-color="#173c4c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd978"/>
      <stop offset="0.55" stop-color="#d8922d"/>
      <stop offset="1" stop-color="#8b4e1d"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7df9ff" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#7df9ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#f9d06a" stop-opacity="0.16"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#57f2ff" stop-opacity="0.3"/>
      <stop offset="0.62" stop-color="#57f2ff" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#57f2ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#dffcff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-25%" y="-30%" width="150%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity="0.36"/>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; letter-spacing: 0; }
      .title { fill: #f7fbff; font-weight: 850; }
      .subtitle { fill: #c4ecef; font-weight: 520; }
      .label { fill: #edf8fb; font-size: 34px; font-weight: 750; }
      .small { fill: #a8c8d0; font-size: 27px; font-weight: 520; }
    </style>
  </defs>
  <rect width="2400" height="1350" fill="url(#bg)"/>
  <rect width="2400" height="1350" fill="url(#grid)"/>
  <ellipse cx="1210" cy="690" rx="820" ry="520" fill="url(#glow)"/>
  <path d="M0 1148 C380 1020 560 1230 930 1088 C1308 942 1540 1075 1840 960 C2098 860 2255 930 2400 820 V1350 H0Z" fill="#060d10" opacity="0.58"/>

  <g transform="translate(126,132)">
    <text class="title" x="0" y="0" font-size="88">机器人产业链深度解析</text>
    <text class="subtitle" x="2" y="74" font-size="38">特斯拉链 × 英伟达链 × 华为链全梳理</text>
    <rect x="0" y="116" width="650" height="6" rx="3" fill="url(#gold)"/>
  </g>

  <g filter="url(#softGlow)">
    <path d="M390 520 C720 450 950 530 1195 660 S1580 812 2045 705" fill="none" stroke="url(#beam)" stroke-width="18" stroke-linecap="round"/>
    <path d="M450 790 C770 690 920 715 1198 710 S1600 700 2040 455" fill="none" stroke="url(#beam)" stroke-width="10" stroke-linecap="round" opacity="0.64"/>
  </g>

  <g transform="translate(126,365)">
    <text class="label" x="0" y="-42">上游核心零部件</text>
    <text class="small" x="0" y="-4">执行器 · 减速器 · 丝杠 · 电机 · 传感器</text>
    <g filter="url(#shadow)">
      <circle cx="120" cy="150" r="80" fill="#142331" stroke="#65f0f2" stroke-width="4"/>
      <circle cx="120" cy="150" r="38" fill="url(#metal)" stroke="#dffcff" stroke-width="4"/>
      <path d="M250 90 H560 L610 150 L560 210 H250 L200 150 Z" fill="#101922" stroke="#65f0f2" stroke-width="4"/>
      <path d="M285 150 H570" stroke="#ffd978" stroke-width="10" stroke-linecap="round"/>
      <path d="M340 116 V184M430 116 V184M520 116 V184" stroke="#7df9ff" stroke-width="6" stroke-linecap="round"/>
      <path d="M82 350 C180 300 330 318 450 390 C535 442 540 552 452 612 C315 704 115 596 48 490 C12 432 28 384 82 350Z" fill="#c98b35"/>
      <path d="M118 374 C210 334 324 346 402 398" fill="none" stroke="#ffe0a3" stroke-width="8" stroke-linecap="round" opacity="0.52"/>
    </g>
  </g>

  <g transform="translate(765,320)" filter="url(#shadow)">
    <text class="label" x="120" y="-38">中游整机与生态</text>
    <text class="small" x="122" y="0">Optimus · GR00T · 鸿蒙具身大脑</text>
    <g transform="translate(130,110)">
      <circle cx="360" cy="120" r="74" fill="#101922" stroke="#65f0f2" stroke-width="5"/>
      <rect x="270" y="210" width="180" height="250" rx="48" fill="#101922" stroke="#65f0f2" stroke-width="5"/>
      <path d="M270 270 L150 390" stroke="#7df9ff" stroke-width="16" stroke-linecap="round"/>
      <path d="M450 270 L585 390" stroke="#7df9ff" stroke-width="16" stroke-linecap="round"/>
      <path d="M305 458 L245 690" stroke="#7df9ff" stroke-width="18" stroke-linecap="round"/>
      <path d="M415 458 L480 690" stroke="#7df9ff" stroke-width="18" stroke-linecap="round"/>
      <circle cx="150" cy="390" r="38" fill="url(#metal)" stroke="#dffcff" stroke-width="4"/>
      <circle cx="585" cy="390" r="38" fill="url(#metal)" stroke="#dffcff" stroke-width="4"/>
      <circle cx="245" cy="690" r="42" fill="url(#metal)" stroke="#dffcff" stroke-width="4"/>
      <circle cx="480" cy="690" r="42" fill="url(#metal)" stroke="#dffcff" stroke-width="4"/>
      <path d="M320 110 H400M320 140 H400" stroke="#21c5b7" stroke-width="10" stroke-linecap="round"/>
      <text class="small" x="360" y="535" font-size="25" text-anchor="middle">人形机器人本体</text>
    </g>
  </g>

  <g transform="translate(1785,342)">
    <text class="label" x="0" y="-34">下游落地</text>
    <text class="small" x="0" y="4">工厂 · 仓储 · 商业服务</text>
    <g filter="url(#shadow)">
      <rect x="20" y="150" width="150" height="450" rx="14" fill="#101922" stroke="#62e6ef" stroke-width="3"/>
      <rect x="194" y="105" width="150" height="495" rx="14" fill="#142331" stroke="#62e6ef" stroke-width="3"/>
      <rect x="368" y="205" width="150" height="395" rx="14" fill="#101922" stroke="#62e6ef" stroke-width="3"/>
      <g fill="#21c5b7">
        <rect x="54" y="215" width="88" height="15" rx="7"/>
        <rect x="54" y="273" width="88" height="15" rx="7"/>
        <rect x="228" y="170" width="88" height="15" rx="7"/>
        <rect x="228" y="228" width="88" height="15" rx="7"/>
        <rect x="402" y="264" width="88" height="15" rx="7"/>
        <rect x="402" y="322" width="88" height="15" rx="7"/>
      </g>
      <path d="M20 675 H520" stroke="#ffd978" stroke-width="12" stroke-linecap="round"/>
      <path d="M88 640 V710M238 640 V710M390 640 V710" stroke="#65f0f2" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(126,1190)">
    <rect x="0" y="0" width="178" height="58" rx="29" fill="#17313c" stroke="#57f2ff" stroke-opacity="0.48"/>
    <rect x="214" y="0" width="178" height="58" rx="29" fill="#3b2b18" stroke="#ffd978" stroke-opacity="0.5"/>
    <rect x="428" y="0" width="178" height="58" rx="29" fill="#132d2b" stroke="#35d39a" stroke-opacity="0.5"/>
    <rect x="642" y="0" width="190" height="58" rx="29" fill="#172538" stroke="#6aa5ff" stroke-opacity="0.48"/>
    <rect x="868" y="0" width="230" height="58" rx="29" fill="#2d1f4a" stroke="#a78bfa" stroke-opacity="0.55"/>
    <text class="small" x="42" y="38">执行器</text>
    <text class="small" x="258" y="38">减速器</text>
    <text class="small" x="480" y="38">丝杠</text>
    <text class="small" x="680" y="38">灵巧手/传感器</text>
    <text class="small" x="910" y="38">T链/NV链/华为链</text>
  </g>
</svg>
