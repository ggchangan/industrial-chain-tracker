name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check JavaScript syntax
        run: npm run check

      - name: Validate blog data
        run: npm run validate
