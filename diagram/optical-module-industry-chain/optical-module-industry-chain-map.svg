    <g transform="translate(34 260)"><rect width="432" height="112" rx="16" fill="#18233f" stroke="#8b5cf6"/><text x="24" y="38" class="cardTitle">薄膜铌酸锂与光学晶体</text><text x="24" y="72" class="item">光库科技｜福晶科技</text><text x="24" y="98" class="small">TFLN调制器 / CPO / 高速低功耗</text></g>
    <g transform="translate(34 394)"><rect width="432" height="112" rx="16" fill="#14352f" stroke="#5cf2b6"/><text x="24" y="38" class="cardTitle">衬底与陶瓷封装</text><text x="24" y="72" class="item">云南锗业｜中瓷电子｜三环集团｜国瓷材料</text><text x="24" y="98" class="small">InP衬底 / 陶瓷外壳 / 基板 / 插芯</text></g>
    <g transform="translate(34 528)"><rect width="432" height="112" rx="16" fill="#2b2a19" stroke="#ffd166"/><text x="24" y="38" class="cardTitle">光纤预制棒与光缆</text><text x="24" y="72" class="item">长飞光纤｜亨通光电</text><text x="24" y="98" class="small">光棒-光纤-光缆 / 三波段多芯光缆</text></g>
