    <g transform="translate(34 296)"><rect width="492" height="132" rx="16" fill="#18233f" stroke="#8b5cf6"/><text x="24" y="42" class="cardTitle">高速光模块</text><text x="24" y="80" class="item">中际旭创｜新易盛｜剑桥科技｜华工科技</text><text x="24" y="110" class="small">800G / 1.6T / LPO / 硅光方案</text></g>
    <g transform="translate(34 464)"><rect width="492" height="132" rx="16" fill="#14352f" stroke="#5cf2b6"/><text x="24" y="42" class="cardTitle">核心变量</text><text x="24" y="80" class="item">云厂CAPEX、订单排期、产能、硅光占比</text><text x="24" y="110" class="small">需求来自英伟达平台与全球AI数据中心</text></g>
  </g>
  <g transform="translate(1308 170)" filter="url(#shadow)">
