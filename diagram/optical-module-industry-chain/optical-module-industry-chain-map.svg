    <g transform="translate(34 132)"><rect width="372" height="132" rx="16" fill="#102f45" stroke="#20d4ff"/><text x="24" y="42" class="cardTitle">CPO硅光交换机</text><text x="24" y="80" class="item">Spectrum-X｜Vera Rubin</text><text x="24" y="110" class="small">光电一体封装 / 功耗下降 / 量产元年</text></g>
    <g transform="translate(34 302)"><rect width="372" height="132" rx="16" fill="#14352f" stroke="#5cf2b6"/><text x="24" y="42" class="cardTitle">光纤光缆网络</text><text x="24" y="80" class="item">长飞光纤｜亨通光电</text><text x="24" y="110" class="small">多芯光缆 / 光纤涨价 / 智算干线</text></g>
    <g transform="translate(34 472)"><rect width="372" height="132" rx="16" fill="#2b2a19" stroke="#ffd166"/><text x="24" y="42" class="cardTitle">交换机与云厂</text><text x="24" y="80" class="item">中兴通讯｜Meta｜Oracle｜微软｜谷歌</text><text x="24" y="110" class="small">AI集群互联 / CPO系统级集成</text></g>
    <g transform="translate(34 642)"><rect width="372" height="74" rx="16" fill="#162b3a" stroke="#46677e"/><text x="24" y="46" class="item">光进铜退：算力释放的连接底座</text></g>
  </g>
  <g stroke="#69e7ff" stroke-width="4" fill="none" marker-end="url(#arrow)" opacity="0.92"><path d="M592 560H650"/><path d="M1230 560H1288"/></g>
  <g transform="translate(92 1010)" filter="url(#shadow)">
    <rect width="1656" height="142" rx="24" fill="#0c1d2b" stroke="#304c64"/>
    <text x="34" y="46" class="cardTitle">动态追踪主线</text>
    <text x="34" y="88" class="item">1. 800G/1.6T订单  2. CPO硅光量产  3. InP/EML/CW光芯片供需  4. 薄膜铌酸锂与光引擎  5. 光纤光缆涨价与多芯光缆商用</text>
