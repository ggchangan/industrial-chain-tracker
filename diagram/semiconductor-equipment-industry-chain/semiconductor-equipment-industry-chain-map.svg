      <text x="24" y="76" class="item">富创精密｜先锋精科｜华亚智能</text>
      <text x="24" y="108" class="small">腔体 / 内衬 / 加热器 / 匀气盘</text>
    </g>
    <g transform="translate(34 286)">
      <rect width="432" height="130" rx="16" fill="#102f45" stroke="#20d4ff"/>
