      <text x="24" y="74" class="item">中微公司｜北方华创</text>
      <text x="24" y="100" class="small">CCP / ICP / 热处理 / 清洗 / DRAM份额</text>
    </g>
    <g transform="translate(34 268)">
      <rect width="492" height="116" rx="16" fill="#14352f" stroke="#5cf2b6"/>
