    <text x="34" y="88" class="item">1. 晶圆厂CAPEX与存储扩产  2. 前道订单与客户验证  3. 核心零部件国产化  4. 后道封测设备兑现  5. 毛利率、现金流与存货</text>
  </g>
  <text x="92" y="1200" class="small">产业链研究库 · 半导体设备 · 2026.06.04</text>
