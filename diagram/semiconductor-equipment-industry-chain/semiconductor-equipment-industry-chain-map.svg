    </g>
    <g transform="translate(34 472)">
      <rect width="372" height="132" rx="16" fill="#2b2a19" stroke="#ffd166"/>
      <text x="24" y="42" class="cardTitle">先进封装与测试</text>
      <text x="24" y="80" class="item">长电科技｜通富微电｜华天科技</text>
      <text x="24" y="110" class="small">TSV / CoWoS / Chiplet带动封装与测试设备</text>
    </g>
    <g transform="translate(34 642)">
      <rect width="372" height="74" rx="16" fill="#162b3a" stroke="#46677e"/>
