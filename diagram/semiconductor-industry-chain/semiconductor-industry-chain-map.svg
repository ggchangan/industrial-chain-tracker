<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1800" viewBox="0 0 1600 1800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="50%" stop-color="#102436"/>
      <stop offset="100%" stop-color="#0d221d"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#31d7ff"/>
      <stop offset="55%" stop-color="#5ef2b1"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
    <style>
      .title{font-family:PingFang SC,Microsoft YaHei,Arial,sans-serif;font-weight:800;fill:#fff}
      .sub{font-family:PingFang SC,Microsoft YaHei,Arial,sans-serif;font-weight:600;fill:#c9efff}
      .card{fill:#0c1d2b;stroke:#2f5f72;stroke-width:2}
      .head{font-family:PingFang SC,Microsoft YaHei,Arial,sans-serif;font-weight:800;fill:#ffffff}
      .body{font-family:PingFang SC,Microsoft YaHei,Arial,sans-serif;font-weight:500;fill:#dcecf2}
      .tag{font-family:PingFang SC,Microsoft YaHei,Arial,sans-serif;font-weight:700;fill:#09121b}
      .small{font-family:PingFang SC,Microsoft YaHei,Arial,sans-serif;font-weight:600;fill:#aee6f5}
    </style>
  </defs>
  <rect width="1600" height="1800" fill="url(#bg)"/>
  <text class="title" x="88" y="110" font-size="58">半导体产业链全景图谱</text>
  <text class="sub" x="90" y="166" font-size="27">芯片设计 → 晶圆制造 → 封装测试 → 半导体设备 → 半导体材料</text>
  <rect x="90" y="205" width="1420" height="8" rx="4" fill="url(#bar)"/>

  <g transform="translate(92 265)">
    <rect class="card" width="1416" height="218" rx="22"/>
    <rect x="32" y="30" width="210" height="48" rx="24" fill="#31d7ff"/>
    <text class="tag" x="66" y="63" font-size="24">01 芯片设计</text>
    <text class="head" x="286" y="66" font-size="36">定义功能与性能：AI芯片、模拟、MCU、CIS、射频</text>
    <text class="body" x="286" y="118" font-size="27">EDA工具 → 架构定义 → 电路设计 → 验证仿真 → GDS版图输出</text>
    <text class="small" x="286" y="169" font-size="24">代表：华大九天、圣邦股份、兆易创新、韦尔股份、卓胜微、海光信息、寒武纪</text>
  </g>

  <g transform="translate(92 525)">
    <rect class="card" width="1416" height="218" rx="22"/>
    <rect x="32" y="30" width="210" height="48" rx="24" fill="#5ef2b1"/>
    <text class="tag" x="66" y="63" font-size="24">02 晶圆制造</text>
    <text class="head" x="286" y="66" font-size="36">资本最密集的胜负手：先进制程与成熟特色工艺并行</text>
    <text class="body" x="286" y="118" font-size="27">硅片清洗 → 光刻 → 刻蚀 → 薄膜沉积 → 离子注入 → CMP → 晶圆测试</text>
    <text class="small" x="286" y="169" font-size="24">代表：中芯国际、华虹公司、华润微；变量：12英寸扩产、产能利用率、出口管制</text>
  </g>

  <g transform="translate(92 785)">
    <rect class="card" width="1416" height="218" rx="22"/>
    <rect x="32" y="30" width="210" height="48" rx="24" fill="#ffd166"/>
    <text class="tag" x="66" y="63" font-size="24">03 封装测试</text>
    <text class="head" x="286" y="66" font-size="36">先进封装重估：CoWoS、HBM、2.5D/3D成为第二增长曲线</text>
    <text class="body" x="286" y="118" font-size="27">晶粒切割 → 互连封装 → 塑封/散热 → 测试分选 → 成品出货</text>
    <text class="small" x="286" y="169" font-size="24">代表：长电科技、通富微电；变量：CoWoS产能、AMD/HBM订单、产能利用率</text>
  </g>

  <g transform="translate(92 1045)">
    <rect class="card" width="1416" height="218" rx="22"/>
    <rect x="32" y="30" width="210" height="48" rx="24" fill="#8ec5ff"/>
    <text class="tag" x="66" y="63" font-size="24">04 半导体设备</text>
    <text class="head" x="286" y="66" font-size="36">国产替代核心抓手：刻蚀、薄膜沉积、清洗先放量</text>
    <text class="body" x="286" y="118" font-size="27">前道设备：光刻、刻蚀、薄膜沉积、清洗、量检测、离子注入、CMP</text>
    <text class="small" x="286" y="169" font-size="24">代表：中微公司、北方华创、拓荆科技、微导纳米、盛美上海；光刻/量检测仍是难点</text>
  </g>

  <g transform="translate(92 1305)">
    <rect class="card" width="1416" height="218" rx="22"/>
    <rect x="32" y="30" width="210" height="48" rx="24" fill="#f4978e"/>
    <text class="tag" x="66" y="63" font-size="24">05 半导体材料</text>
    <text class="head" x="286" y="66" font-size="36">产业链粮食端：硅片、光刻胶、电子特气、靶材、CMP</text>
    <text class="body" x="286" y="118" font-size="27">关键耗材贯穿全流程，整体国产化率仍低，高端光刻胶和靶材替代空间大</text>
    <text class="small" x="286" y="169" font-size="24">代表：沪硅产业、安集科技、华特气体、中船特气；子系列：光刻胶、光刻机、设备、存储</text>
  </g>

  <g stroke="url(#bar)" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M800 485v36"/>
    <path d="M800 745v36"/>
    <path d="M800 1005v36"/>
    <path d="M800 1265v36"/>
  </g>
  <g transform="translate(92 1588)">
    <rect width="1416" height="124" rx="20" fill="#081620" stroke="#2f5f72" stroke-width="2"/>
    <text class="head" x="38" y="48" font-size="30">核心驱动</text>
    <text class="body" x="210" y="48" font-size="25">WSTS上修 · 存储涨价 · AI算力 · 先进封装 · 大基金三期 · 国产替代并跑</text>
    <text class="small" x="38" y="92" font-size="22">母篇导航：连接半导体设备、存储、光刻机、光刻胶等已建档子系列，后续动态以总览视角追踪景气传导。</text>
  </g>
</svg>
