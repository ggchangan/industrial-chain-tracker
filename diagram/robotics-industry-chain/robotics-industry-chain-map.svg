<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1840 1240">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.6"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0, 10 4, 0 8" fill="#22d3ee"/></marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0, 10 4, 0 8" fill="#fbbf24"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0, 10 4, 0 8" fill="#34d399"/></marker>
    <style>
      text { font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; letter-spacing: 0; }
      .title { fill: #f8fafc; font-size: 32px; font-weight: 850; }
      .subtitle { fill: #94a3b8; font-size: 15px; font-weight: 500; }
      .region-title { font-size: 18px; font-weight: 850; }
      .region-sub { fill: #94a3b8; font-size: 12px; font-weight: 500; }
      .node-title { fill: #f8fafc; font-size: 15px; font-weight: 850; }
      .node-sub { fill: #cbd5e1; font-size: 11px; font-weight: 520; }
      .company { fill: #e2e8f0; font-size: 11px; font-weight: 650; }
      .arrow-label { fill: #bae6fd; font-size: 11px; font-weight: 800; }
      .note-title { fill: #f8fafc; font-size: 14px; font-weight: 850; }
      .note { fill: #cbd5e1; font-size: 11px; font-weight: 520; }
    </style>
  </defs>
  <rect width="1840" height="1240" fill="#0f172a"/>
  <rect width="1840" height="1240" fill="url(#grid)"/>
  <circle cx="910" cy="500" r="380" fill="#0e7490" opacity="0.09"/>
  <circle cx="1480" cy="380" r="320" fill="#f59e0b" opacity="0.07"/>

  <text x="60" y="62" class="title">机器人产业链全景与生态传导图</text>
  <text x="60" y="92" class="subtitle">2026量产元年，沿“核心零部件 → 本体/生态平台 → 工厂与服务场景”推动T链、NV链、华为链并行放量</text>

  <rect x="50" y="135" width="560" height="710" rx="18" fill="rgba(8,51,68,0.18)" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="9 6"/>
  <text x="82" y="172" class="region-title" fill="#67e8f9">上游：核心零部件</text>
  <text x="82" y="197" class="region-sub">决定成本、精度、可靠性和量产良率</text>

  <rect x="710" y="135" width="410" height="710" rx="18" fill="rgba(120,53,15,0.18)" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="9 6"/>
  <text x="742" y="172" class="region-title" fill="#fcd34d">中游：本体与生态链</text>
  <text x="742" y="197" class="region-sub">特斯拉链、英伟达链、华为链并行</text>

  <rect x="1220" y="135" width="570" height="710" rx="18" fill="rgba(6,78,59,0.18)" stroke="#34d399" stroke-width="1.5" stroke-dasharray="9 6"/>
  <text x="1252" y="172" class="region-title" fill="#86efac">下游：商业化落地</text>
  <text x="1252" y="197" class="region-sub">工厂、仓储、商业服务与家庭场景</text>

  <!-- Upstream nodes -->
  <g><rect x="82" y="230" width="240" height="100" rx="10" fill="#0f172a"/><rect x="82" y="230" width="240" height="100" rx="10" fill="rgba(8,51,68,0.42)" stroke="#22d3ee" stroke-width="1.7"/><text x="202" y="262" class="node-title" text-anchor="middle">执行器总成</text><text x="202" y="287" class="node-sub" text-anchor="middle">旋转/直线关节，BOM价值最高</text><text x="202" y="314" class="company" text-anchor="middle">三花智控 · 拓普集团</text></g>
  <g><rect x="352" y="230" width="225" height="100" rx="10" fill="#0f172a"/><rect x="352" y="230" width="225" height="100" rx="10" fill="rgba(120,53,15,0.35)" stroke="#f59e0b" stroke-width="1.7"/><text x="464" y="262" class="node-title" text-anchor="middle">减速器</text><text x="464" y="287" class="node-sub" text-anchor="middle">谐波/RV/行星，多路线并行</text><text x="464" y="314" class="company" text-anchor="middle">绿的 · 双环 · 中大</text></g>
  <g><rect x="82" y="366" width="240" height="100" rx="10" fill="#0f172a"/><rect x="82" y="366" width="240" height="100" rx="10" fill="rgba(6,78,59,0.38)" stroke="#34d399" stroke-width="1.7"/><text x="202" y="398" class="node-title" text-anchor="middle">电机与灵巧手</text><text x="202" y="423" class="node-sub" text-anchor="middle">空心杯电机/微型齿轮箱</text><text x="202" y="450" class="company" text-anchor="middle">鸣志 · 兆威 · 江苏雷利</text></g>
  <g><rect x="352" y="366" width="225" height="100" rx="10" fill="#0f172a"/><rect x="352" y="366" width="225" height="100" rx="10" fill="rgba(136,19,55,0.34)" stroke="#fb7185" stroke-width="1.7"/><text x="464" y="398" class="node-title" text-anchor="middle">丝杠</text><text x="464" y="423" class="node-sub" text-anchor="middle">行星滚柱/微型滚珠丝杠</text><text x="464" y="450" class="company" text-anchor="middle">五洲 · 恒立 · 浙江荣泰</text></g>
  <g><rect x="82" y="502" width="240" height="100" rx="10" fill="#0f172a"/><rect x="82" y="502" width="240" height="100" rx="10" fill="rgba(59,130,246,0.32)" stroke="#60a5fa" stroke-width="1.7"/><text x="202" y="534" class="node-title" text-anchor="middle">传感器</text><text x="202" y="559" class="node-sub" text-anchor="middle">3D视觉/力矩/IMU/电子皮肤</text><text x="202" y="586" class="company" text-anchor="middle">奥比 · 柯力 · 福莱</text></g>
  <g><rect x="352" y="502" width="225" height="100" rx="10" fill="#0f172a"/><rect x="352" y="502" width="225" height="100" rx="10" fill="rgba(76,29,149,0.32)" stroke="#a78bfa" stroke-width="1.7"/><text x="464" y="534" class="node-title" text-anchor="middle">结构件/组装</text><text x="464" y="559" class="node-sub" text-anchor="middle">壳体、夹爪、整机组装</text><text x="464" y="586" class="company" text-anchor="middle">长盈 · 蓝思 · 旭升</text></g>
  <g><rect x="82" y="650" width="495" height="92" rx="12" fill="#0f172a"/><rect x="82" y="650" width="495" height="92" rx="12" fill="rgba(30,41,59,0.55)" stroke="#64748b" stroke-width="1.5"/><text x="112" y="686" class="note-title">上游核心变量</text><text x="112" y="715" class="note">订单确认、技术路线、产能爬坡、BOM价值量、毛利率与估值兑现</text></g>

  <!-- Middle ecosystems -->
  <g><rect x="762" y="238" width="306" height="126" rx="14" fill="#0f172a"/><rect x="762" y="238" width="306" height="126" rx="14" fill="rgba(120,53,15,0.38)" stroke="#fbbf24" stroke-width="2"/><text x="915" y="276" class="node-title" font-size="18" text-anchor="middle">特斯拉链 T链</text><text x="915" y="306" class="node-sub" text-anchor="middle">Optimus Gen3，垂直整合量产</text><text x="915" y="336" class="company" text-anchor="middle">执行器/丝杠/灵巧手/传感器</text></g>
  <g><rect x="762" y="406" width="306" height="126" rx="14" fill="#0f172a"/><rect x="762" y="406" width="306" height="126" rx="14" fill="rgba(8,51,68,0.42)" stroke="#22d3ee" stroke-width="2"/><text x="915" y="444" class="node-title" font-size="18" text-anchor="middle">英伟达链 NV链</text><text x="915" y="474" class="node-sub" text-anchor="middle">GR00T + Jetson Thor + Isaac</text><text x="915" y="504" class="company" text-anchor="middle">宇树 · 绿的 · 双环 · 奥比</text></g>
  <g><rect x="762" y="574" width="306" height="126" rx="14" fill="#0f172a"/><rect x="762" y="574" width="306" height="126" rx="14" fill="rgba(6,78,59,0.38)" stroke="#34d399" stroke-width="2"/><text x="915" y="612" class="node-title" font-size="18" text-anchor="middle">华为链</text><text x="915" y="642" class="node-sub" text-anchor="middle">鸿蒙具身大脑，通用操作系统</text><text x="915" y="672" class="company" text-anchor="middle">兆威 · 拓斯达 · 埃斯顿</text></g>

  <!-- Downstream -->
  <g><rect x="1255" y="230" width="230" height="112" rx="10" fill="#0f172a"/><rect x="1255" y="230" width="230" height="112" rx="10" fill="rgba(8,51,68,0.42)" stroke="#22d3ee" stroke-width="1.7"/><text x="1370" y="264" class="node-title" text-anchor="middle">工厂制造</text><text x="1370" y="289" class="node-sub" text-anchor="middle">汽车厂、电子厂、装配产线</text><text x="1370" y="317" class="company" text-anchor="middle">特斯拉/比亚迪/蔚来等</text></g>
  <g><rect x="1520" y="230" width="230" height="112" rx="10" fill="#0f172a"/><rect x="1520" y="230" width="230" height="112" rx="10" fill="rgba(6,78,59,0.42)" stroke="#34d399" stroke-width="1.7"/><text x="1635" y="264" class="node-title" text-anchor="middle">仓储物流</text><text x="1635" y="289" class="node-sub" text-anchor="middle">搬运、分拣、巡检</text><text x="1635" y="317" class="company" text-anchor="middle">量产早期优先场景</text></g>
  <g><rect x="1255" y="392" width="495" height="138" rx="12" fill="#0f172a"/><rect x="1255" y="392" width="495" height="138" rx="12" fill="rgba(59,130,246,0.32)" stroke="#60a5fa" stroke-width="1.7"/><text x="1502" y="428" class="node-title" text-anchor="middle">商业/家庭服务与工业机器人</text><text x="1502" y="462" class="node-sub" text-anchor="middle">商业服务、家庭助理、工业机器人上云与自动化产线</text><text x="1502" y="502" class="company" text-anchor="middle">从表演走向稳定作业</text></g>
  <g><rect x="1255" y="590" width="495" height="92" rx="12" fill="#0f172a"/><rect x="1255" y="590" width="495" height="92" rx="12" fill="rgba(120,53,15,0.26)" stroke="#fbbf24" stroke-width="1.5"/><text x="1285" y="626" class="note-title">下游核心变量</text><text x="1285" y="655" class="note">真实订单、稳定作业时长、部署台数、客户复购和整机成本下降</text></g>

  <!-- arrows -->
  <path d="M577 282 C640 292 700 300 754 300" fill="none" stroke="#22d3ee" stroke-width="3.2" marker-end="url(#arrow-cyan)"/>
  <path d="M577 416 C650 420 700 438 754 466" fill="none" stroke="#34d399" stroke-width="3.2" marker-end="url(#arrow-green)"/>
  <path d="M577 552 C660 550 708 604 754 636" fill="none" stroke="#fbbf24" stroke-width="3.2" marker-end="url(#arrow-amber)"/>
  <text x="658" y="270" class="arrow-label" text-anchor="middle">零部件供应</text>
  <path d="M1068 300 C1140 292 1192 286 1246 286" fill="none" stroke="#fbbf24" stroke-width="4" marker-end="url(#arrow-amber)"/>
  <path d="M1068 468 C1145 438 1198 398 1246 342" fill="none" stroke="#22d3ee" stroke-width="3" marker-end="url(#arrow-cyan)"/>
  <path d="M1068 636 C1160 620 1202 546 1246 500" fill="none" stroke="#34d399" stroke-width="3" marker-end="url(#arrow-green)"/>
  <path d="M1610 560 C1480 875 1150 900 915 760 C660 608 455 735 290 792" fill="none" stroke="#fbbf24" stroke-width="3.5" stroke-dasharray="10 8" marker-end="url(#arrow-amber)"/>
  <text x="1130" y="860" fill="#fcd34d" font-size="13" font-weight="850" text-anchor="middle">需求反向拉动：量产订单 → BOM降本 → 核心零部件扩产 → 业绩验证</text>

  <rect x="50" y="885" width="1740" height="282" rx="18" fill="rgba(15,23,42,0.84)" stroke="#334155" stroke-width="1.5"/>
  <text x="82" y="928" class="region-title" fill="#e2e8f0">行业核心逻辑</text>
  <g><rect x="90" y="968" width="390" height="122" rx="12" fill="#0f172a"/><rect x="90" y="968" width="390" height="122" rx="12" fill="rgba(8,51,68,0.42)" stroke="#22d3ee" stroke-width="1.6"/><text x="118" y="1004" class="note-title">1. 2026量产元年</text><text x="118" y="1034" class="note">行业从主题投资走向订单验证</text><text x="118" y="1058" class="note">估值体系从PS向PE切换</text></g>
  <g><rect x="520" y="968" width="390" height="122" rx="12" fill="#0f172a"/><rect x="520" y="968" width="390" height="122" rx="12" fill="rgba(120,53,15,0.34)" stroke="#fbbf24" stroke-width="1.6"/><text x="548" y="1004" class="note-title">2. 三条生态链并行</text><text x="548" y="1034" class="note">T链重量产，NV链重开放平台，华为链重通用大脑</text><text x="548" y="1058" class="note">A股零部件公司按生态卡位分化</text></g>
  <g><rect x="950" y="968" width="390" height="122" rx="12" fill="#0f172a"/><rect x="950" y="968" width="390" height="122" rx="12" fill="rgba(6,78,59,0.38)" stroke="#34d399" stroke-width="1.6"/><text x="978" y="1004" class="note-title">3. 中国供应链优势</text><text x="978" y="1034" class="note">核心零部件国产化率高，整机成本低</text><text x="978" y="1058" class="note">执行器、减速器、丝杠、灵巧手最受益</text></g>
  <g><rect x="1380" y="968" width="370" height="122" rx="12" fill="#0f172a"/><rect x="1380" y="968" width="370" height="122" rx="12" fill="rgba(76,29,149,0.34)" stroke="#a78bfa" stroke-width="1.6"/><text x="1408" y="1004" class="note-title">4. 技术路线快速迭代</text><text x="1408" y="1034" class="note">关节、灵巧手、传感器方案仍在变化</text><text x="1408" y="1058" class="note">需持续跟踪被替代风险</text></g>
</svg>
