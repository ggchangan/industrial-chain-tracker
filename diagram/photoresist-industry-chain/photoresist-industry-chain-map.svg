  <path d="M1435 286 L1460 286" fill="none" stroke="#34d399" stroke-width="4" marker-end="url(#arrow-green)"/>
  <path d="M1550 560 C1430 838 1120 862 885 742 C638 616 430 725 280 760" fill="none" stroke="#fbbf24" stroke-width="3.5" stroke-dasharray="10 8" marker-end="url(#arrow-amber)"/>
  <text x="1095" y="834" fill="#fcd34d" font-size="13" font-weight="850" text-anchor="middle">需求反向拉动：AI扩产 → ArF/KrF用量提升 → 涨价 → 国产验证加速</text>

  <!-- Bottom logic -->
  <rect x="50" y="845" width="1660" height="272" rx="18" fill="rgba(15,23,42,0.84)" stroke="#334155" stroke-width="1.5"/>
