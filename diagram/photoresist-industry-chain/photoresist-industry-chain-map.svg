  <g>
    <rect x="90" y="928" width="370" height="118" rx="12" fill="#0f172a"/>
    <rect x="90" y="928" width="370" height="118" rx="12" fill="rgba(8,51,68,0.42)" stroke="#22d3ee" stroke-width="1.6"/>
    <text x="118" y="964" class="note-title">1. 供需缺口与涨价</text>
    <text x="118" y="994" class="note">日本厂商主导高端供给，ArF/KrF供需紧张</text>
    <text x="118" y="1018" class="note">光刻胶成本占比低，涨价传导相对顺畅</text>
  </g>
  <g>
    <rect x="500" y="928" width="370" height="118" rx="12" fill="#0f172a"/>
    <rect x="500" y="928" width="370" height="118" rx="12" fill="rgba(120,53,15,0.34)" stroke="#fbbf24" stroke-width="1.6"/>
    <text x="528" y="964" class="note-title">2. 国产替代验证窗口</text>
    <text x="528" y="994" class="note">KrF国产化率约10%，ArF不足2%</text>
    <text x="528" y="1018" class="note">大厂开放验证，率先量产企业获得份额</text>
  </g>
  <g>
    <rect x="910" y="928" width="370" height="118" rx="12" fill="#0f172a"/>
    <rect x="910" y="928" width="370" height="118" rx="12" fill="rgba(6,78,59,0.38)" stroke="#34d399" stroke-width="1.6"/>
    <text x="938" y="964" class="note-title">3. AI芯片高端化</text>
    <text x="938" y="994" class="note">先进制程和多重曝光提升ArF胶用量</text>
    <text x="938" y="1018" class="note">高端胶价值占比持续提升</text>
  </g>
  <g>
    <rect x="1320" y="928" width="360" height="118" rx="12" fill="#0f172a"/>
    <rect x="1320" y="928" width="360" height="118" rx="12" fill="rgba(76,29,149,0.34)" stroke="#a78bfa" stroke-width="1.6"/>
