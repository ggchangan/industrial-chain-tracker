  <path d="M557 285 C625 292 680 306 734 312" fill="none" stroke="#22d3ee" stroke-width="3.2" marker-end="url(#arrow-cyan)"/>
  <path d="M557 425 C640 414 690 382 734 338" fill="none" stroke="#fb7185" stroke-width="3.2" marker-end="url(#arrow-amber)"/>
