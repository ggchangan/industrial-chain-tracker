    <g transform="translate(34 286)"><rect width="492" height="122" rx="16" fill="#18233f" stroke="#8b5cf6"/><text x="24" y="40" class="cardTitle">ODM/EMS整机制造</text><text x="24" y="76" class="item">华勤技术｜龙旗科技｜闻泰科技｜光弘科技</text><text x="24" y="106" class="small">手机 / AIPC / 平板 / 可穿戴 / 服务器延伸</text></g>
    <g transform="translate(34 444)"><rect width="492" height="122" rx="16" fill="#14352f" stroke="#5cf2b6"/><text x="24" y="40" class="cardTitle">核心变量</text><text x="24" y="76" class="item">AI终端渗透、单机BOM、补贴换机、库存水位</text><text x="24" y="106" class="small">从出货量逻辑转向价值量逻辑</text></g>
  </g>
  <g transform="translate(1308 170)" filter="url(#shadow)">
    <rect width="440" height="780" rx="24" fill="#0d2233" stroke="#ff7ab6" stroke-width="2.5"/>
    <text x="34" y="56" class="stage">下游：终端与新物种</text>
    <text x="34" y="90" class="desc">品牌生态决定换机和创新节奏</text>
    <g transform="translate(34 132)"><rect width="372" height="132" rx="16" fill="#102f45" stroke="#20d4ff"/><text x="24" y="42" class="cardTitle">AI手机与折叠屏</text><text x="24" y="80" class="item">苹果｜华为｜小米｜荣耀</text><text x="24" y="110" class="small">折叠屏iPhone / AI旗舰机 / 鸿蒙生态</text></g>
    <g transform="translate(34 302)"><rect width="372" height="132" rx="16" fill="#18233f" stroke="#8b5cf6"/><text x="24" y="42" class="cardTitle">AIPC与平板</text><text x="24" y="80" class="item">高算力笔记本｜32GB+1TB配置</text><text x="24" y="110" class="small">旗舰机吃份额，BOM价值提升</text></g>
    <g transform="translate(34 472)"><rect width="372" height="132" rx="16" fill="#2d1c2a" stroke="#ff7ab6"/><text x="24" y="42" class="cardTitle">AI眼镜与可穿戴</text><text x="24" y="80" class="item">歌尔股份｜安克创新｜瑞声科技</text><text x="24" y="110" class="small">下一代交互入口，声学光学结构件受益</text></g>
    <g transform="translate(34 642)"><rect width="372" height="74" rx="16" fill="#162b3a" stroke="#46677e"/><text x="24" y="46" class="item">补贴托底：以旧换新缩短换机周期</text></g>
  </g>
  <g stroke="#69e7ff" stroke-width="4" fill="none" marker-end="url(#arrow)" opacity="0.92"><path d="M592 560H650"/><path d="M1230 560H1288"/></g>
  <g transform="translate(92 1010)" filter="url(#shadow)">
    <rect width="1656" height="142" rx="24" fill="#0c1d2b" stroke="#304c64"/>
    <text x="34" y="46" class="cardTitle">动态追踪主线</text>
    <text x="34" y="88" class="item">1. AI手机/AIPC渗透  2. 折叠屏iPhone进度  3. AI眼镜出货  4. 以旧换新补贴  5. 存储/散热/电池/FPC单机价值量  6. ODM订单与库存</text>
  </g>
  <text x="92" y="1200" class="small">产业链研究库 · 消费电子 · 2026.06.04</text>
