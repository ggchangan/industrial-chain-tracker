    <text x="34" y="56" class="stage">上游：核心元器件</text>
    <text x="34" y="90" class="desc">AI端侧升级带动单机价值量提升</text>
    <g transform="translate(34 126)"><rect width="432" height="104" rx="16" fill="#102f45" stroke="#20d4ff"/><text x="24" y="36" class="cardTitle">芯片与存储</text><text x="24" y="68" class="item">兆易创新｜韦尔股份｜南芯科技｜卓胜微</text><text x="24" y="94" class="small">NOR/DRAM / CIS / PMIC / 射频</text></g>
    <g transform="translate(34 252)"><rect width="432" height="104" rx="16" fill="#18233f" stroke="#8b5cf6"/><text x="24" y="36" class="cardTitle">显示与光学</text><text x="24" y="68" class="item">京东方A｜维信诺｜水晶光电｜思特威</text><text x="24" y="94" class="small">折叠屏 / OLED / 多摄 / AI视觉</text></g>
    <g transform="translate(34 378)"><rect width="432" height="104" rx="16" fill="#14352f" stroke="#5cf2b6"/><text x="24" y="36" class="cardTitle">结构件/散热/电池</text><text x="24" y="68" class="item">蓝思科技｜领益智造｜飞荣达｜欣旺达</text><text x="24" y="94" class="small">玻璃盖板 / 功能件 / VC散热 / 电池容量</text></g>
    <g transform="translate(34 504)"><rect width="432" height="104" rx="16" fill="#2d1c2a" stroke="#ff7ab6"/><text x="24" y="36" class="cardTitle">声学与PCB/FPC</text><text x="24" y="68" class="item">歌尔股份｜鹏鼎控股｜东山精密｜顺络电子</text><text x="24" y="94" class="small">AI语音 / TWS / 折叠屏FPC / 被动元件</text></g>
  </g>
