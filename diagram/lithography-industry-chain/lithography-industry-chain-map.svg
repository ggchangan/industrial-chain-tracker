<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 1180">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.6"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#34d399"/>
    </marker>
    <style>
      text { font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; letter-spacing: 0; }
      .title { fill: #f8fafc; font-size: 32px; font-weight: 850; }
      .subtitle { fill: #94a3b8; font-size: 15px; font-weight: 500; }
      .region-title { font-size: 18px; font-weight: 850; }
      .region-sub { fill: #94a3b8; font-size: 12px; font-weight: 500; }
      .node-title { fill: #f8fafc; font-size: 15px; font-weight: 850; }
      .node-sub { fill: #cbd5e1; font-size: 11px; font-weight: 520; }
      .company { fill: #e2e8f0; font-size: 11px; font-weight: 650; }
      .tiny { fill: #94a3b8; font-size: 10px; font-weight: 520; }
      .arrow-label { fill: #bae6fd; font-size: 11px; font-weight: 800; }
      .note-title { fill: #f8fafc; font-size: 14px; font-weight: 850; }
      .note { fill: #cbd5e1; font-size: 11px; font-weight: 520; }
