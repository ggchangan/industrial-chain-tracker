  <text x="60" y="62" class="title">光刻机产业链全景与价值传导图</text>
  <text x="60" y="92" class="subtitle">AI芯片扩产与自主可控驱动，沿“核心零部件 → 整机制造 → 晶圆制造/先进封装”推动国产替代</text>

