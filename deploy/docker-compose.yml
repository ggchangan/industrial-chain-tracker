services:
  chain-tracker:
    image: ccr.ccs.tencentyun.com/ygys30ds/industrial-chain-tracker:${IMAGE_TAG:-latest}
    container_name: chain-tracker
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:?ADMIN_SESSION_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://industry.ygys30ds.cloud}
      NODE_ENV: production
      PORT: 4173
      HOST: 0.0.0.0
    ports:
      - "127.0.0.1:4173:4173"
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:4173/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
