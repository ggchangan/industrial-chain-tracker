services:
  chain-tracker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: chain-tracker
    networks:
      chain-net:
        ipv4_address: 172.20.0.2
    restart: unless-stopped

networks:
  chain-net:
    name: chain-net
    ipam:
      config:
        - subnet: 172.20.0.0/16
