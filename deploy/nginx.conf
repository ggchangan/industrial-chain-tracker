upstream industry_chain_app {
    server 127.0.0.1:4173;
    keepalive 16;
}

server {
    listen 80;
    server_name
        industry.ygys30ds.cloud
        api.industry.ygys30ds.cloud
        static.industry.ygys30ds.cloud
        admin.industry.ygys30ds.cloud;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name industry.ygys30ds.cloud;

    include /etc/nginx/snippets/industry-ssl.conf;

    location / {
        proxy_pass http://industry_chain_app;
        include /etc/nginx/snippets/industry-proxy.conf;
    }
}

server {
    listen 443 ssl http2;
    server_name api.industry.ygys30ds.cloud;

    include /etc/nginx/snippets/industry-ssl.conf;

    location = / {
        default_type application/json;
        return 200 '{"service":"industrial-chain-api","status":"ok"}';
    }

    location /api/ {
        proxy_pass http://industry_chain_app;
        include /etc/nginx/snippets/industry-proxy.conf;
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl http2;
    server_name static.industry.ygys30ds.cloud;

    include /etc/nginx/snippets/industry-ssl.conf;

    location ~ ^/(assets|cover-image|diagram)/ {
        proxy_pass http://industry_chain_app;
        include /etc/nginx/snippets/industry-proxy.conf;
        proxy_cache_valid 200 1h;
        expires 1h;
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl http2;
    server_name admin.industry.ygys30ds.cloud;

    include /etc/nginx/snippets/industry-ssl.conf;

    location = / {
        return 302 /admin-login.html;
    }

    location / {
        proxy_pass http://industry_chain_app;
        include /etc/nginx/snippets/industry-proxy.conf;
    }
}
