server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 纯静态网站，无 SPA 回退
    location / {
        try_files $uri $uri/ =404;
    }

    # 静态资源缓存（可选）
    location ~* \.(svg|png|jpg|jpeg|css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
