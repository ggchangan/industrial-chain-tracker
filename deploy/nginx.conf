server {
    listen 80;
    server_name _;

    root /app;
    index blog/index.html;

    # 静态资源缓存（SVG/PNG/CSS/JS 可缓存，内容不频繁变）
    location ~* \.(svg|png|jpg|jpeg|gif|ico|css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Markdown / JSON 内容文件（不缓存，方便更新）
    location ~* \.(md|json)$ {
        expires -1;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # 默认：直接返回文件，无 SPA 回退
    location / {
        try_files $uri $uri/ =404;
    }
}
